<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
    }

    section {
        & h1 {
            text-align: center;
        }
    }

    .main {
        background-color: antiquewhite;
        width: 100%;
        height: 90vh;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        padding: 10px;

        & .items {
            box-shadow: 0px 0px 10px 0px black;
            border: 2px solid black;
            border-radius: 10px;
        }

        & .items img {
            width: 100%;
            height: 70%;
        }
    }

    .show {
        position: fixed;
        width: 100%;
        height: 100%;
        background-color: rgba(14, 13, 13, 0.5);
        display: none;



        & .showitem {
            position: fixed;
            width: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background-color: aliceblue;

            & span {
                position: absolute;
                right: 10px;
                cursor: pointer;
                font-size: 25px;
            }

            & img {
                width: 100%;
                display: block;
            }
        }
    }

    .showModel {
        display: block;
    }
</style>

<body>
    <div class="show">
        <div class="showitem">
            <span>&times;</span>
            <img src="" alt="">
        </div>
    </div>
    <section>
        <h1>Ligth Box</h1>
        <div class="main">
            <div class="items">
                <img src="./assets/img1" alt="">
                <p>Card1</p>
            </div>
            <div class="items">
                <img src="./assets/img1" alt="">
                <p>Card1</p>
            </div>
            <div class="items">
                <img src="./assets/img1" alt="">
                <p>Card1</p>
            </div>
            <div class="items">
                <img src="./assets/img1" alt="">
                <p>Card1</p>
            </div>
            <div class="items">
                <img src="./assets/img1" alt="">
                <p>Card1</p>
            </div>
            <div class="items">
                <img src="./assets/img1" alt="">
                <p>Card1</p>
            </div>
            <div class="items">
                <img src="./assets/img1" alt="">
                <p>Card1</p>
            </div>
            <div class="items">
                <img src="./assets/img1" alt="">
                <p>Card1</p>
            </div>
        </div>
    </section>
</body>
<script>
    let mainDiv = document.querySelector('.main');
    let show = document.querySelector('.show');
    let img = document.querySelector('.showitem img');
    let imgDiv = document.querySelector('.showitem');
    let span = document.querySelector('span')

    mainDiv.addEventListener('click', (e) => {
        if (e.target.tagName == 'IMG') {
            let imgPath = e.target.src
            show.classList.add('showModel');
            img.src = imgPath
        }

    })
    span.addEventListener('click', () => {
        show.classList.remove('showModel');
        img.src = '';
    })
    show.addEventListener('click', () => {
        show.classList.remove('showModel');
        img.src = '';
    })
    imgDiv.addEventListener('click', (e) => {
        e.stopPropagation();
    })



</script>

</html>
